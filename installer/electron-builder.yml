appId: com.diorite.ide
productName: Diorite
copyright: Copyright © 2026 Diorite

directories:
  output: ../dist/installer
  buildResources: ../assets

# App code (compiled electron main + built frontend, packed into asar)
files:
  - ../electron/dist/**/*
  - ../frontend/dist/**/*
  - ../assets/**/*
  - package.json

# Runtimes shipped next to the app (not in asar so they can be executed)
extraResources:
  # Frozen backend exe (PyInstaller) — users need NO Python installed
  - from: ../backend/dist/diorite-backend
    to: backend
    filter:
      - "**/*"
  # Frontend served from disk in packaged app
  - from: ../frontend/dist
    to: frontend/dist
    filter:
      - "**/*"

win:
  target:
    - target: nsis
      arch: [x64]
  icon: ../assets/icons/icon.ico
  publisherName: Diorite Team

nsis:
  # ONE-CLICK installer: double-click EXE → installs → done. No wizard steps.
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Diorite
  runAfterFinish: true
  installerIcon: ../assets/icons/icon.ico
  uninstallerIcon: ../assets/icons/icon.ico
  installerHeaderIcon: ../assets/icons/icon.ico
  artifactName: Diorite-Setup-${version}-${arch}.${ext}

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: ../assets/icons/icon.png
  category: public.app-category.developer-tools

linux:
  target:
    - target: AppImage
      arch: [x64]
  icon: ../assets/icons/icon.png
  category: Development

publish: null

# Auto updates disabled for now
