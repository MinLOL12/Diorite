name: Build Installer

# Canonical copy lives at .github/workflows/build-installer.yml
# This file under installer/workflows/ is a backup/reference that
# gets mirrored to .github/workflows/. If you forked before that folder
# existed, you can manually copy this file to .github/workflows/ and push.
#
# What it does: builds the Windows EXE without needing anything on your PC —
# go to your repo → Actions → "Build Installer" → Run workflow → download
# "Diorite-Setup-Windows" from the run's Artifacts.
# Pushing a tag like v1.0.0 also attaches the EXE to a GitHub Release.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    name: Windows EXE installer
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build the one-click installer
        run: npm run make:exe

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: Diorite-Setup-Windows
          path: dist/installer/*.exe
          if-no-files-found: error
          retention-days: 90

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/installer/*.exe
          generate_release_notes: true
