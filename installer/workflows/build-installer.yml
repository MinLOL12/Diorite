# Place this file at .github/workflows/build-installer.yml to enable GitHub
# cloud builds. (GitHub only lets workflow files be added from your own
# account: push it yourself, or create it via Repo → Actions → New workflow
# → paste this content.)
#
# Why bother: you get the EXE without installing ANYTHING on your PC —
# go to Actions → "Build Installer" → Run workflow → download
# "Diorite-Setup-Windows" from the run's Artifacts.
# Pushing a tag like v1.0.0 also attaches the EXE to a GitHub Release.

name: Build Installer

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  windows:
    name: Windows EXE installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build the one-click installer
        run: npm run make:exe

      - uses: actions/upload-artifact@v4
        with:
          name: Diorite-Setup-Windows
          path: dist/installer/*.exe
          retention-days: 90

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/installer/*.exe
          generate_release_notes: true
